<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneBytePixel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Orbitron', sans-serif;
    background:#0c0c14;
    color:#fff;
}
nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:rgba(12,12,20,0.8);
}
nav .logo {
    font-size:24px;
    letter-spacing:2px;
}
nav a {
    color:#ff2d75;
    text-decoration:none;
    margin-left:30px;
    font-weight:700;
}
.hero {
    text-align:center;
    padding:120px 10%;
    background:#0c0c14;
}
.hero h1 {
    font-size:64px;
    color:#ff2d75;
    text-shadow:0 0 10px #ff2d75, 0 0 20px #ff4d95;
    margin-bottom:20px;
}
.hero p {
    font-size:22px;
    color:#ffa3c1;
    margin-bottom:40px;
}
.hero button {
    padding:15px 40px;
    background:#ff2d75;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    text-transform:uppercase;
    font-weight:700;
    box-shadow:0 0 10px #ff2d75;
    transition:.3s;
}
.hero button:hover {
    transform:scale(1.05);
    box-shadow:0 0 20px #ff4d95;
}
.games {
    display:flex;
    justify-content:space-between;
    padding:60px 8%;
    gap:20px;
}
.card {
    background:#161622;
    flex:1;
    border-radius:15px;
    overflow:hidden;
    transition:.4s;
    box-shadow:0 0 10px #ff2d75;
}
.card:hover {
    transform:translateY(-10px);
    box-shadow:0 0 30px #ff4d95;
}
.card img {
    width:100%;
    height:200px;
    object-fit:cover;
}
.card-content {
    padding:20px;
    text-align:center;
}
.card-content h3 {
    font-size:22px;
    color:#ff2d75;
    text-shadow:0 0 5px #ff2d75;
    margin-bottom:10px;
}
.card-content p {
    font-size:16px;
    color:#ffa3c1;
}
footer {
    text-align:center;
    padding:40px 8%;
    background:#0a0a12;
    color:#555;
}
</style>
</head>
<body>

<nav>
    <div class="logo">OneBytePixel</div>
    <div>
        <a href="#">Games</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1>ARCADE ROOTS</h1>
    <p>From Arcade to Virtual Reality — Love Games, Audio City</p>
    <button>View Games</button>
</section>

<section class="games">
    <!-- Pierwszy kafelek: Tree Jumping -->
    <div class="card">
        <img src="treejumping-1.png" alt="Tree Jumping">
        <div class="card-content">
            <h3>Tree Jumping</h3>
            <p>Vertical arcade action — climb, dash, survive!</p>
        </div>
    </div>

    <!-- Puste kafelki -->
    <div class="card">
        <div class="card-content">
            <h3>Coming Soon</h3>
        </div>
    </div>

    <div class="card">
        <div class="card-content">
            <h3>Coming Soon</h3>
        </div>
    </div>
</section>

<footer>
© 2026 OneBytePixel — Independent Game Studio
</footer>

</body>
</html>
